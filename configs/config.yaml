seed: 42

paths:
  outputs:     src\visualisation/            # figures, reports
  experiments: experiments/        # checkpoints + logs per run

data:
  flag: pneumoniamnist
  batch_size: 128

training:
  num_epochs: 10
  num_epochs_search: 5
  checkpoint_every_n_epochs: 5    

hyperparameter_search:
  lr_values:           [0.0001, 0.0005, 0.001]
  weight_decay_values: [0.0,    0.0001, 0.001]

knn:
  pca_components: 50
  k_range:        [1, 30]         
  weights:        [uniform, distance]
  metrics:        [euclidean, manhattan, minkowski]
  cv_folds:       3